name: Create and init repo

on:
  workflow_dispatch:
    inputs:
      target_org:
        description: "目标 GitHub 组织名"
        required: false
        default: "Business-Unit-for-Platform"
      source_owner:
        description: "源 GitHub owner/org"
        required: false
        default: "Business-Unit-for-Platform"
      source_repo:
        description: "源仓库名"
        required: false
        default: "ruoyi-vue-pro"
      source_ref:
        description: "源分支/标签"
        required: false
        default: "master-jdk17"
      repo_name:
        description: "要创建的新 GitHub 仓库名（例如: future-vue-pro）"
        required: true
        default: "future-vue-pro"
      repo_description:
        description: "仓库描述"
        required: false
        default: "Init from Gitee ruoyi-vue-pro master-jdk17"
      private:
        description: "是否创建为私有仓库 (true/false)"
        required: false
        default: "false"

jobs:
  create-and-init:
    runs-on: ubuntu-latest
    env:
      ORG: ${{ github.event.inputs.target_org || 'Business-Unit-for-Platform' }}
      SOURCE_OWNER: ${{ github.event.inputs.source_owner || 'Business-Unit-for-Platform' }}
      SOURCE_REPO: ${{ github.event.inputs.source_repo || 'ruoyi-vue-pro' }}
      SOURCE_REF: ${{ github.event.inputs.source_ref || 'master-jdk17' }}
      NEW_REPO: ${{ github.event.inputs.repo_name }}
      REPO_DESC: ${{ github.event.inputs.repo_description }}
      PRIVATE: ${{ github.event.inputs.private }}
      HAS_APP_ID: ${{ vars.APP_ID != '' }}
      HAS_APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY != '' }}

    steps:
      - name: Checkout Clone-Bot
        uses: actions/checkout@v4

      - name: Generate GitHub App installation token
        id: app-token
        if: ${{ env.HAS_APP_ID == 'true' && env.HAS_APP_PRIVATE_KEY == 'true' }}
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.ORG }}

      - name: Export APP_TOKEN
        shell: bash
        env:
          APP_INSTALLATION_TOKEN: ${{ steps.app-token.outputs.token }}
          FALLBACK_PAT: ${{ secrets.GH_PAT || secrets.PERSONAL_ACCESS_TOKEN || secrets.PAT }}
        run: |
          set -euo pipefail

          if [ -n "${APP_INSTALLATION_TOKEN}" ]; then
            echo "Using GitHub App installation token."
            echo "APP_TOKEN=${APP_INSTALLATION_TOKEN}" >> "$GITHUB_ENV"
          elif [ -n "${FALLBACK_PAT}" ]; then
            echo "Using PAT fallback token from GH_PAT / PERSONAL_ACCESS_TOKEN / PAT."
            echo "APP_TOKEN=${FALLBACK_PAT}" >> "$GITHUB_ENV"
          else
            echo "ERROR: No usable GitHub write token configured." >&2
            echo "Configure either vars.APP_ID + secrets.APP_PRIVATE_KEY for the GitHub App," >&2
            echo "or configure a PAT secret named GH_PAT, PERSONAL_ACCESS_TOKEN, or PAT." >&2
            exit 1
          fi

      - name: Install Python dependencies
        run: pip install -q -r tools/requirements.txt

      - name: Delete existing repo if exists
        shell: bash
        run: |
          set -euo pipefail
          CODE="$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${ORG}/${NEW_REPO}")"

          if [ "${CODE}" = "200" ]; then
            curl -sS -o /dev/null -X DELETE \
              -H "Authorization: Bearer ${APP_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${ORG}/${NEW_REPO}"
            sleep 3
          fi

      - name: Clone, process and prepare repo content
        shell: bash
        run: |
          set -euo pipefail

          git clone -q -b "${SOURCE_REF}" --depth=1 --single-branch \
            "https://github.com/${SOURCE_OWNER}/${SOURCE_REPO}.git" source

          rm -rf source/.git source/.gitee source/.github source/.image \
                 source/Readme.md source/yudao-ui

          (cd source && python3 ../tools/replace_all.py)

          mkdir -p source/.github/workflows
          if [ ! -f "templates/workflows/maven.yml" ]; then
            echo "ERROR: templates/workflows/maven.yml not found"
            exit 1
          fi
          cp -f templates/workflows/maven.yml source/.github/workflows/maven.yml

          mkdir -p repo_content
          cp -a source/. repo_content/
          rm -rf source

          (cd repo_content && python3 ../tools/restructure_layout.py)
          (cd repo_content && python3 ../tools/split_api_biz.py)
          (cd repo_content && python3 ../tools/uncomment_maven.py)
          (cd repo_content && python3 ../tools/patch_application_local.py)

      - name: Create new GitHub repo (org)
        shell: bash
        run: |
          set -euo pipefail

          PRIVATE_BOOL=$( [ "${PRIVATE}" = "true" ] && echo true || echo false )

          RESP="$(curl -sS \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/orgs/${ORG}/repos" \
            -d "{
              \"name\": \"${NEW_REPO}\",
              \"description\": \"${REPO_DESC}\",
              \"private\": ${PRIVATE_BOOL}
            }")"

          if ! echo "${RESP}" | grep -q '"full_name"'; then
            echo "ERROR: Failed to create repo. Response: ${RESP}"
            exit 1
          fi

          sleep 3

          curl -sS -o /dev/null -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${APP_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${ORG}/${NEW_REPO}" \
            -d '{"security_and_analysis":{"secret_scanning":{"status":"enabled"},"secret_scanning_push_protection":{"status":"disabled"}}}' \
            || true

      - name: Push to new repo
        shell: bash
        run: |
          set -euo pipefail

          git config --global credential.helper store
          echo "https://x-access-token:${APP_TOKEN}@github.com" > ~/.git-credentials

          cd repo_content
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -q -m "Initial commit: 梦开始的地方"
          git branch -M master
          git remote add origin "https://github.com/${ORG}/${NEW_REPO}.git"
          git push -q -u origin master

          rm -f ~/.git-credentials
